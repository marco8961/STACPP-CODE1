# ==============================================================================
# 🐳 PROYECTO 01 - PRODUCTION READY DOCKER COMPOSE (AWS MULTI-AZ COMPATIBLE)
# Arquitectura: Estructura de archivos limpia y agrupada por entornos
# ==============================================================================

services:

  # ============================================================================
  # 🌐 NGINX GATEWAY (ÚNICO PUNTOS PÚBLICOS DETRÁS DEL ALB)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      # Se monta como una plantilla (.template) para inyectar variables de entorno
      - ./infra/nginx/conf/default.conf:/etc/nginx/templates/default.conf.template:ro
      - ./web/stacpp/static:/usr/share/nginx/html:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME} # Pasa la variable del .env a Nginx
    networks:
      - frontend_net
      - backend_net
      - admin_net

  # ============================================================================
  # 🌐 N8N (CONECTADO A TU RDS POSTGRESQL DE AWS - CERO SQLITE LOCAL)
  # ============================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    expose:
      - "5678"
    env_file:
      - .env
    environment:
      - N8N_HOST=n8n.${DOMAIN_NAME}
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.${DOMAIN_NAME}/
      - N8N_EDITOR_BASE_URL=https://n8n.${DOMAIN_NAME}/
      
      # 🗄️ CONFIGURACIÓN DE BASE DE DATOS PARA AWS RDS (POSTGRESQL)
      - N8N_DATABASE_TYPE=postgresdb
      - N8N_DATABASE_HOST=${DB_HOST}         # Tu endpoint de AWS RDS
      - N8N_DATABASE_PORT=${DB_PORT:-5432}   # Puerto por defecto de Postgres
      - N8N_DATABASE_USER=${DB_USER}         # Tu usuario maestro de RDS
      - N8N_DATABASE_PASSWORD=${DB_PASSWORD} # Tu contraseña de RDS
      - N8N_DATABASE_NAME=n8n_prod           # Database creada previamente en RDS
      
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
    volumes:
      # 📦 CORREGIDO: Enlazado directo al volumen nativo EFS definido abajo
      - efs-apps-docker-stacpp:/home/node/.n8n
    networks:
      - backend_net

  # ============================================================================
  # 🧠 MICROSERVICIOS BACKEND NUMERADOS (DENTRO DE LA CARPETA /apps)
  # ============================================================================
  
  # 01. Gestor de Mensajes (Usa Telethon)
  01-gestor-mensajes:
    image: python:3.10-slim
    container_name: 01-gestor-mensajes
    env_file:
      - .env
    restart: always
    working_dir: /app
    volumes:
      - ./apps/01-gestor-mensajes:/app
      - ./web/webs:/webs
      # 📦 Compartimos el mismo volumen de EFS para que Python pueda leer las capturas que guarde n8n
      - efs-apps-docker-stacpp:/app/infra_compartida
    environment:
      - PYTHONUNBUFFERED=1
    command: sh -c "pip install --no-cache-dir -r requirements1.txt && python main.py"
    expose:
      - "8000" # Sincronizado con el puerto de tu Nginx default.conf
    networks:
      - backend_net

  # 02. Analizador de Archivos Adjuntos
  02-analizador-adjuntos:
    image: python:3.10-slim
    container_name: 02-analizador-adjuntos
    restart: always
    working_dir: /app
    volumes:
      - ./apps/02-analizador-adjuntos:/app
    command: sh -c "pip install --no-cache-dir -r requirements2.txt && python main.py"
    expose:
      - "8001" # Sincronizado con el puerto de tu Nginx default.conf
    networks:
      - backend_net

  # 03. Detector de Phishing (Modelo Sentence-Transformers)
  03-detector-phishing:
    image: python:3.10-slim
    container_name: 03-detector-phishing
    env_file:
      - .env
    restart: always
    working_dir: /app
    volumes:
      - ./apps/03-detector-phishing:/app
    command: sh -c "pip install --no-cache-dir -r requirements3.txt && python api/main.py"
    expose:
      - "8002" # Sincronizado con el puerto de tu Nginx default.conf
    environment:
      - PYTHONPATH=/app
    networks:
      - backend_net

  # ============================================================================
  # 🛡️ SEGURIDAD INTERNA
  # ============================================================================
  clamav-service:
    image: clamav/clamav:latest
    container_name: clamav-service
    restart: always
    expose:
      - "3310"
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - backend_net

  # ============================================================================
  # 🔐 ADMIN (COMPONENTES DE INFRAESTRUCTURA INTERNA)
  # ============================================================================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    expose:
      - "9000"
      - "9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - admin_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - admin_net

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - admin_net

  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: always
    expose:
      - "7575"
    volumes:
      - ./infra/homarr:/appdata 
    environment:
      - AUTH_SECRET=${HOMARR_AUTH_SECRET}         # Desde el .env
      - SECRET_ENCRYPTION_KEY=${HOMARR_CRYPT_KEY} # Desde el .env
      - NEXTAUTH_URL=https://homarr.${DOMAIN_NAME}
    networks:
      - admin_net

# ============================================================================
# 🌐 GESTIÓN DE REDES (Aislamiento de Entornos)
# ============================================================================
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  admin_net:
    driver: bridge

# ============================================================================
# 💾 VOLÚMENES PERSISTENTES
# ============================================================================
volumes:
  # 📌 Volúmenes Locales del Servidor
  portainer_data:
  clamav_data:
  grafana_data:

  # 📦 CORREGIDO: Declaración de volumen AWS EFS compartido mediante protocolo NFS
  efs-apps-docker-stacpp:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${EFS_VOLUME_ID}.efs.us-east-1.amazonaws.com,rw,nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport"
      device: ":"
